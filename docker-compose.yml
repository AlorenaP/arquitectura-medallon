# Aquí sí usamos compose y sus nombres de servicio se resuelven 
# solos por DNS interno — ya no necesitas docker inspect para sacar IPs

services:
  bbdd:
    build: ./BBDD
    container_name: bbdd_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ejercicio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - medallon_net

  ingesta:
    build: ./Ingesta
    image: ingesta:latest
    profiles: ["build-only"]
    networks:
      - medallon_net

  airflow:
    build: ./Airflow
    container_name: airflow_orquestador
    depends_on:
      - bbdd
    user: "0:0"
    environment:
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    ports:
      - "8081:8080"
    volumes:
      - ./Airflow/dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - medallon_net
    command: standalone

networks:
  medallon_net:
    name: medallon_net

volumes:
  pgdata:
  airflow_data:
